<div class="app" [class.sidebar-open]="sidebarOpen()">

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" (click)="closeSidebar()"></div>

  <app-sidebar />

  <div class="main">
    <!-- Mobile top bar -->
    <header class="mobile-topbar">
      <button class="hamburger" (click)="toggleSidebar()" aria-label="Menü öffnen">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M2 4.5h14M2 9h14M2 13.5h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
      <span class="mobile-topbar__title">Tour Planner</span>
    </header>

    <router-outlet />
  </div>
</div>
