<div class="alert" [class]="'alert--' + type">
  <div class="alert__body">

    @switch (type) {
      @case ('success') {
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" class="alert__icon">
          <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.3"/>
          <path d="M5 8l2 2 4-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      }
      @case ('warning') {
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" class="alert__icon">
          <path d="M8 2L14.5 14H1.5L8 2Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
          <path d="M8 6v4M8 11.5v1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      }
      @default {
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" class="alert__icon">
          <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.3"/>
          <path d="M8 5v4M8 10.5v1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      }
    }

    <span class="alert__message">{{ message }}</span>

    <ng-content />

  </div>
</div>
