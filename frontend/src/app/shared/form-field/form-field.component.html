<div class="field">
  <label class="field__label">
    {{ label }}
    @if (required) { <span class="required-mark">*</span> }
  </label>

  <ng-content />

  @if (activeError) {
    <span class="field__hint field__hint--error">{{ activeError }}</span>
  } @else if (hint) {
    <span class="field__hint">{{ hint }}</span>
  }
</div>
